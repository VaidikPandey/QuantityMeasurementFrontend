<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantity Measurement App</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body class="auth-page">
    <!-- Theme Toggle -->
    <div class="auth-theme-toggle">
      <button class="theme-toggle" onclick="toggleTheme()">
        <span id="theme-icon">☀️</span>
      </button>
    </div>

    <div class="auth-container fade-in">
      <!-- Logo -->
      <div class="auth-logo">
        <h1>⚖️ Quantity Measurement</h1>
        <p>Measure, Convert and Compare quantities</p>
      </div>

      <!-- Card -->
      <div class="card">
        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login-section">
            Login
          </button>
          <button class="auth-tab" data-tab="register-section">Register</button>
        </div>

        <!-- Login Form -->
        <div class="auth-form active" id="login-section">
          <div class="alert" id="login-alert"></div>

          <form id="login-form">
            <div class="form-group">
              <label>Email</label>
              <input
                type="email"
                id="login-email"
                placeholder="you@example.com"
                required
              />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input
                type="password"
                id="login-password"
                placeholder="Enter your password"
                required
              />
            </div>
            <button
              type="submit"
              class="btn btn-primary"
              id="login-btn"
              data-text="Login"
            >
              Login
            </button>
          </form>

          <div class="divider">or</div>

          <a
            href="http://localhost:8080/oauth2/authorization/google"
            class="btn btn-google"
          >
            <img
              src="https://www.google.com/favicon.ico"
              width="18"
              height="18"
              alt="Google"
            />
            Continue with Google
          </a>
        </div>

        <!-- Register Form -->
        <div class="auth-form" id="register-section">
          <div class="alert" id="register-alert"></div>

          <form id="register-form">
            <div class="form-group">
              <label>Full Name</label>
              <input
                type="text"
                id="register-name"
                placeholder="Vaidik Pandey"
                required
              />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input
                type="email"
                id="register-email"
                placeholder="you@example.com"
                required
              />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input
                type="password"
                id="register-password"
                placeholder="Min 6 characters"
                required
              />
            </div>
            <div class="form-group">
              <label>Confirm Password</label>
              <input
                type="password"
                id="register-confirm"
                placeholder="Repeat password"
                required
              />
            </div>
            <button
              type="submit"
              class="btn btn-primary"
              id="register-btn"
              data-text="Create Account"
            >
              Create Account
            </button>
          </form>

          <div class="divider">or</div>

          <a
            href="http://localhost:8080/oauth2/authorization/google"
            class="btn btn-google"
          >
            <img
              src="https://www.google.com/favicon.ico"
              width="18"
              height="18"
              alt="Google"
            />
            Continue with Google
          </a>
        </div>
      </div>

      <div class="auth-footer">
        <p>By continuing you agree to our Terms of Service</p>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
